<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌹 Sürprizim 🌹</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Georgia', serif;
            background: #1a0a0a;
            height: 100vh;
            width: 100vw;
            cursor: pointer;
            user-select: none;
        }
        #start-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(135deg, #1a0a0a 0%, #3d0c0c 50%, #1a0a0a 100%);
            transition: opacity 1.5s ease;
        }
        #start-screen.hidden { opacity: 0; pointer-events: none; }
        .big-rose {
            font-size: 120px;
            animation: pulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 0, 80, 0.6));
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .big-rose:hover { transform: scale(1.2); }
        .big-rose:active { transform: scale(0.9); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .touch-text {
            margin-top: 30px;
            color: #ffb7c5;
            font-size: 24px;
            letter-spacing: 3px;
            animation: fadeInOut 2s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(255, 183, 197, 0.5);
        }
        @keyframes fadeInOut { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 500;
            font-size: 30px;
            animation: explode 3s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 1; }
            20% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(var(--rot)); opacity: 1; }
            100% { transform: translate(calc(var(--tx) * 2), calc(var(--ty) * 2 + 200px)) scale(0.3) rotate(calc(var(--rot) * 3)); opacity: 0; }
        }
        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 501;
            font-size: 25px;
            animation: heartFloat 4s ease-out forwards;
        }
        @keyframes heartFloat {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            30% { transform: translate(var(--hx), var(--hy)) scale(1.2); opacity: 1; }
            100% { transform: translate(calc(var(--hx) * 1.5), calc(var(--hy) * 1.5 - 300px)) scale(0.5); opacity: 0; }
        }
        #message-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 900;
            background: linear-gradient(180deg, #0d0202 0%, #2d0a0a 30%, #4a0e0e 60%, #0d0202 100%);
        }
        #message-screen.active { display: flex; animation: fadeIn 2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .message-container { text-align: center; padding: 40px; max-width: 800px; }
        .line {
            color: #fff;
            font-size: 32px;
            margin: 15px 0;
            opacity: 0;
            transform: translateY(30px);
            text-shadow: 0 0 20px rgba(255, 0, 80, 0.8), 0 0 40px rgba(255, 0, 80, 0.4);
            letter-spacing: 2px;
        }
        .line.show { animation: slideUp 1.5s ease forwards; }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        .heart-beat {
            font-size: 60px;
            margin: 20px 0;
            animation: heartbeat 1.5s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 15% { transform: scale(1.3); } 30% { transform: scale(1); } 45% { transform: scale(1.15); } }
        .bg-hearts {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .floating-heart {
            position: absolute;
            font-size: 20px;
            opacity: 0.3;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; } 90% { opacity: 0.3; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
        .sparkle {
            position: fixed;
            width: 4px; height: 4px;
            background: #ffd700;
            border-radius: 50%;
            pointer-events: none;
            z-index: 600;
            animation: sparkleAnim 1s ease-out forwards;
            box-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700;
        }
        @keyframes sparkleAnim { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        .youtube-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            width: 300px;
            height: 170px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 0, 80, 0.5);
            opacity: 0;
            transition: opacity 1.5s ease 3s;
            border: 2px solid rgba(255, 0, 80, 0.3);
        }
        .youtube-container.visible { opacity: 1; }
        .youtube-container iframe { width: 100%; height: 100%; border: none; }
        .music-title {
            position: fixed;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffb7c5;
            font-size: 16px;
            z-index: 1001;
            opacity: 0;
            transition: opacity 1s ease 2.5s;
            text-shadow: 0 0 10px rgba(255, 0, 80, 0.5);
            letter-spacing: 2px;
        }
        .music-title.visible { opacity: 1; }
        @media (max-width: 600px) {
            .big-rose { font-size: 80px; }
            .touch-text { font-size: 18px; }
            .line { font-size: 22px; }
            .heart-beat { font-size: 40px; }
            .youtube-container { width: 250px; height: 140px; }
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <div class="big-rose" id="mainRose">🌹</div>
        <div class="touch-text">Güle dokun 🌹</div>
    </div>
    <div id="message-screen">
        <div class="bg-hearts" id="bgHearts"></div>
        <div class="message-container">
            <div class="heart-beat">💖</div>
            <div class="line line-1" id="line1">Küçücüğüm...</div>
            <div class="line line-2" id="line2">Her şeyimsin...</div>
            <div class="line line-3" id="line3">İyi ki varsın 💕</div>
            <div class="line line-4" id="line4">Özür dilerim 🙏</div>
            <div class="heart-beat">💕</div>
        </div>
        <div class="music-title" id="musicTitle">🎵 Yalın - Küçücüğüm</div>
        <div class="youtube-container" id="youtubeContainer">
            <iframe id="ytPlayer" src="https://www.youtube.com/embed/8xg3vE8Ie_E?autoplay=0&mute=0&controls=1&loop=1&playlist=8xg3vE8Ie_E" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>
    <script>
        const mainRose = document.getElementById('mainRose');
        const startScreen = document.getElementById('start-screen');
        const messageScreen = document.getElementById('message-screen');
        const bgHearts = document.getElementById('bgHearts');
        const youtubeContainer = document.getElementById('youtubeContainer');
        const musicTitle = document.getElementById('musicTitle');
        const ytPlayer = document.getElementById('ytPlayer');
        function createBgHearts() {
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = ['❤️', '💖', '💕', '💗', '💝'][Math.floor(Math.random() * 5)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 10 + 10) + 's';
                heart.style.animationDelay = Math.random() * 10 + 's';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                bgHearts.appendChild(heart);
            }
        }
        createBgHearts();
        function createRoseExplosion(x, y) {
            const roses = ['🌹', '🌺', '🌸', '💐', '🌷', '🥀'];
            const hearts = ['❤️', '💖', '💕', '💗', '💝', '💘'];
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerHTML = roses[Math.floor(Math.random() * roses.length)];
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                const angle = (Math.PI * 2 * i) / 30;
                const distance = Math.random() * 300 + 100;
                particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                particle.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
                particle.style.animationDelay = Math.random() * 0.3 + 's';
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 3000);
            }
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                const angle = (Math.PI * 2 * i) / 20;
                const distance = Math.random() * 400 + 150;
                heart.style.setProperty('--hx', Math.cos(angle) * distance + 'px');
                heart.style.setProperty('--hy', Math.sin(angle) * distance + 'px');
                heart.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }
            for (let i = 0; i < 15; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = (x + Math.random() * 200 - 100) + 'px';
                sparkle.style.top = (y + Math.random() * 200 - 100) + 'px';
                sparkle.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1000);
            }
        }
        mainRose.addEventListener('click', function(e) {
            const rect = mainRose.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            createRoseExplosion(x, y);
            setTimeout(() => {
                startScreen.classList.add('hidden');
                setTimeout(() => {
                    startScreen.style.display = 'none';
                    messageScreen.classList.add('active');
                    setTimeout(() => document.getElementById('line1').classList.add('show'), 500);
                    setTimeout(() => document.getElementById('line2').classList.add('show'), 2000);
                    setTimeout(() => document.getElementById('line3').classList.add('show'), 3500);
                    setTimeout(() => document.getElementById('line4').classList.add('show'), 5000);
                    setTimeout(() => {
                        musicTitle.classList.add('visible');
                        youtubeContainer.classList.add('visible');
                        ytPlayer.src = ytPlayer.src.replace('autoplay=0', 'autoplay=1');
                    }, 2500);
                }, 1500);
            }, 1000);
        });
        mainRose.addEventListener('touchstart', function(e) {
            e.preventDefault();
            mainRose.click();
        });
    </script>
</body>
</html>
